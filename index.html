<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Agent Behavior Analysis</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
  :root{
    --bg:#f6f8fb;--surface:#ffffff;--border:#d9e0ea;--text:#101828;--muted:#5f6b7a;--accent:#0f172a;--shadow:0 1px 2px rgba(16,24,40,0.04);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial;sans-serif;background:var(--bg);color:var(--text)}
  .wrap{max-width:960px;margin:0 auto;padding:32px}
  .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:20px}
  .brand{display:flex;align-items:center;gap:12px;color:var(--text);border:0;background:transparent;padding:0;cursor:pointer;text-align:left}
  .brand-mark{width:36px;height:36px;border-radius:8px;background:var(--surface);border:1px solid var(--border);display:grid;place-items:center;font-weight:700}
  h1{margin:0;font-size:1.6rem}
  .hero{padding:20px;border-radius:10px;background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow)}
  .lede{margin-top:8px;color:var(--muted);line-height:1.5}
  .actions{margin-top:14px;display:flex;gap:8px}
  .button{padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:#fff;color:var(--text);text-decoration:none;font-weight:600}
  .button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  .button{padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:#fff;color:var(--text);text-decoration:none;font-weight:600;cursor:pointer;transition:background .15s ease,border-color .15s ease,box-shadow .12s ease}
  .button:hover{filter:brightness(.97);box-shadow:0 2px 6px rgba(16,24,40,0.06)}
  .button:focus{outline:2px solid rgba(16,24,40,0.06);outline-offset:2px}
  .section{margin-top:18px}
  .section-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:10px}
  .section-head h2{margin:0;font-size:0.78rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--accent)}
  .list{display:grid;gap:8px}
  .item{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;padding:12px;border-radius:8px;background:var(--surface);border:1px solid var(--border);text-decoration:none;color:var(--text)}
  .list{display:grid;gap:10px}
  .item{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;padding:12px;border-radius:8px;background:var(--surface);border:1px solid var(--border);text-decoration:none;color:var(--text);cursor:pointer;transition:transform .12s ease,border-color .12s ease,box-shadow .12s ease}
  .item:hover{transform:translateY(-2px);border-color:var(--border-strong);box-shadow:0 4px 10px rgba(16,24,40,0.04)}
  .item:focus{outline:2px solid rgba(16,24,40,0.06);outline-offset:2px}
  .num{width:32px;height:32px;border-radius:6px;border:1px solid var(--border);display:grid;place-items:center;background:#f9fafb;color:var(--muted);font-weight:600}
  .item strong{display:block}
  .item span{display:block;color:var(--muted);margin-top:2px;font-size:0.95rem}
  .arrow{color:var(--muted)}
  .footer{margin-top:18px;padding-top:14px;border-top:1px solid var(--border);display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;color:var(--muted)}
  @media(max-width:640px){.wrap{padding:20px}.item{grid-template-columns:auto 1fr}.arrow{display:none}}
</style>
</head>
<body>
  <main class="wrap">
    <header class="topbar">
      <button class="brand" type="button" data-href="#experiments"><div class="brand-mark" aria-hidden="true"></div><div class="brand-copy"><strong>Agent Behavior Analysis</strong><div style="color:var(--muted);font-size:0.92rem">Project index</div></div></button>
      <div style="color:var(--muted);font-size:0.92rem">1 experiment available</div>
    </header>

    <section class="hero">
      <h1>Standalone experiment pages</h1>
      <p class="lede">Simple, professional index to open standalone experiment HTML files in this repository.</p>
      <div class="actions">
        <button class="button primary" type="button" data-href="#experiments">Experiments</button>
        <button class="button" type="button" data-href="E1.1_interpretability_analysis.html">Open current</button>
      </div>
    </section>

    <section class="section" id="experiments">
      <div class="section-head"><h2>Experiments</h2><div style="color:var(--muted)">Links to HTML files</div></div>
      <div class="list" id="experiment-list"></div>
    </section>

    <footer class="footer"><div>Static GitHub Pages index</div><div><button class="button" type="button" data-href="E1.1_interpretability_analysis.html">E1.1_interpretability_analysis.html</button></div></footer>
  </main>

  <script>
    const experiments = [{id:'01',title:'Interpretability Analysis',description:'Three agents, one ambiguous prompt, and a structural comparison.',href:'E1.1_interpretability_analysis.html'}];
    const list = document.getElementById('experiment-list');
    list.innerHTML = experiments.map(e=>`<button class="item" type="button" data-href="${e.href}"><div class="num">${e.id}</div><div><strong>${e.title}</strong><span>${e.description}</span></div><div class="arrow">→</div></button>`).join('');

    // Navigation handler for elements with data-href
    function attachNavHandlers(){
      document.querySelectorAll('[data-href]').forEach(el=>{
        if(el._navAttached) return; el._navAttached=true;
        el.addEventListener('click', ()=>{ const target=el.getAttribute('data-href'); if(target.startsWith('#')){ const node=document.querySelector(target); if(node){ node.scrollIntoView({behavior:'smooth',block:'start'}); return; } } window.location.href = target; });
        el.addEventListener('keydown', (ev)=>{ if(ev.key==='Enter' || ev.key===' '){ ev.preventDefault(); el.click(); } });
      });
    }

    attachNavHandlers();
  </script>
</body>
</html>
